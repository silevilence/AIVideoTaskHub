name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
      - 'V[0-9]*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VER=$(echo "$TAG" | sed 's/^[Vv]//')
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VER" >> $GITHUB_OUTPUT

      - name: Extract changelog
        id: changelog
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          VERSION_UPPER=$(echo "$TAG" | sed 's/^v/V/')
          VERSION_LOWER=$(echo "$TAG" | sed 's/^V/v/')

          CONTENT=$(awk -v ver_u="## $VERSION_UPPER" -v ver_l="## $VERSION_LOWER" '
            BEGIN { found=0 }
            {
              line = $0
              gsub(/[[:space:]]+$/, "", line)
            }
            line == ver_u || line == ver_l { found=1; next }
            found && /^## / { exit }
            found { print }
          ' changelog.md)

          if [ -z "$CONTENT" ]; then
            echo "::error::Failed to extract changelog for version $TAG from changelog.md"
            exit 1
          fi

          {
            echo "BODY<<CHANGELOG_EOF"
            echo "$CONTENT"
            echo "CHANGELOG_EOF"
          } >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/silevilence/aivideotaskhub
            silevilence/ai-video-task-hub
          tags: |
            type=raw,value=${{ steps.version.outputs.VERSION }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container health check
        run: |
          # 拉取刚构建的镜像并启动容器
          IMAGE="ghcr.io/silevilence/aivideotaskhub:${{ steps.version.outputs.VERSION }}"
          docker run -d --name health-check-test -p 3001:3000 "$IMAGE"

          # 等待容器启动（最多 30 秒）
          echo "Waiting for container to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Health check passed!"
              RESPONSE=$(curl -s http://localhost:3001/api/health)
              echo "Response: $RESPONSE"
              # 验证返回 status=ok
              echo "$RESPONSE" | grep -q '"status":"ok"' || {
                echo "::error::Health check returned non-ok status: $RESPONSE"
                docker logs health-check-test
                docker rm -f health-check-test
                exit 1
              }
              docker rm -f health-check-test
              exit 0
            fi
            sleep 1
          done

          echo "::error::Health check failed - container did not become healthy within 30 seconds"
          docker logs health-check-test
          docker rm -f health-check-test
          exit 1

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: silevilence/ai-video-task-hub
          readme-filepath: ./README.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.TAG }}
          name: Release ${{ steps.version.outputs.TAG }}
          body: ${{ steps.changelog.outputs.BODY }}
          draft: false
          prerelease: false
